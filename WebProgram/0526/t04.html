<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function power(x, y) {
            let res = 1;
            for (let i = 1; i < y; i++) {
                res *= x;
            }
            return res;
        }
    </script>
</head>
<body>
    <button onclick="alert(power(7, 4))">함수</button>
</body>
</html>
