<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        const PI = Math.PI;
        function circleCalculate(radius) {
            let area = PI * radius * radius;
            let circumference = 2 * PI * radius;
            alert("반지름: " + radius + "\n넓이: " + area.toFixed(2) + "\n둘레: " + circumference.toFixed(2));
        }

        circleCalculate(5);
        circleCalculate(10);
    </script>
</head>

</body>
</html>
