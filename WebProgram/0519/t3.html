<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let r = 7;
        const PI = Math.PI;
        
        let circum = 2 * PI * r;
        alert("반지름이 " + r + "cm인 원의 둘레는 " + circum + "cm");

        let area = PI * Math.pow(r, 2);
        alert("반지름이 " + r + "cm인 원의 넓이는 " + area + "cm^2");

        let date = new Date();
        let year = date.getFullYear();
        let month = date.getMonth() + 1;
        let day = date.getDate();
        let hours = date.getHours();
        let minutes = date.getMinutes();
        let seconds = date.getSeconds();

        let meridiem = hours < 12 ? "오전" : "오후";
        hours = hours % 12 || 12;

        alert("오늘은 " + year + "년 " + month + "월 " + day + "일 " + meridiem + " " + hours + "시 " + minutes + "분 " + seconds + "초입니다.");
    </script>
</head>
<body>
    
</body>
</html>
