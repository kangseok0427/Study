<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function add(a, b) {
            alert(a + " + " + b + " = " + (a + b));
        }

        function subtract(a, b) {
            alert(a + " - " + b + " = " + (a - b));
        }
        function greet(name) {
            alert("Hello, " + name + "!");
        }

        add(5, 3);
        subtract(5, 3);
        greet("Alice");
        greet("Bob");
    </script>
</head>

</body>
</html>
