<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script>
        $(document).ready(function(){
            $("#sec").css("color", "red");
            $(".thi").css("background-color", "blue");
            let srcPath = $("#img1").attr("src");
            $("h2").text(srcPath);
            $("img").attr({
                    "src": "imgs/p1.jpg",
                    "width": "500",
                    "height": "300"
                });
        })
    </script>
</head>
<body>
    <h1>jQuery Test</h1>
    <h2 id="h2"></h2>
    <h1 id="sec">jQuery Test</h1>
    <h1 class="thi">jQuery Test</h1>
    <img>
    <img>
    <img>
</body>
</html>
