<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 슬라이드쇼</title>
    <script>
        window.onload = function() {
            changeImage();
        }

        function changeImage() {
            let img = document.querySelector("img");
            let images = ["imgs/p1.jpg", "imgs/p2.jpg", "imgs/p3.jpg", "imgs/p4.jpg", "imgs/p5.jpg"];
            let index = 0;
            setInterval(function() {
                index = (index + 1) % images.length;
                img.src = images[index];
            }, 2000);
        }

        window.onload = function() {
            let a1 = document.getElementById("a1");
            a1.onclick = function(){
                //event.preventDefault();
                return false;
            }
        }
    </script>
</head>
<body>
    <img src = "imgs/p1.jpg" width="500" height="300">
    <a href="https://www.google.com" id="a1">디폴트 이벤트 제거</a>
</body>
</html>
